name: PQC release package
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Build release zip
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $Version = $env:GITHUB_REF_NAME -replace '^v',''
          $Manifest = 'dist/package_manifest.json'
          if (-not (Test-Path $Manifest)) { Write-Error 'dist/package_manifest.json missing'; exit 1 }
          $manifest = Get-Content $Manifest -Raw | ConvertFrom-Json
          if ($manifest.sku -ne 'ZQM-PQC-READINESS-001') { Write-Error "Unexpected SKU: $($manifest.sku)"; exit 1 }
          .\scripts\build_release.ps1 -Version $Version
          $zip = Get-Item "dist\zqm_attestation_release_package_v${Version}.zip"
          $sha = (Get-FileHash -Path $zip.FullName -Algorithm SHA256).Hash
          Set-Content -Path "$($zip.FullName).sha256" -Value "$sha  $($zip.Name)" -Encoding UTF8
          Write-Host "::group::Artifacts"
          Write-Host "zip=$($zip.FullName)"
          Write-Host "sha256=$sha"
          Write-Host "::endgroup::"
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/zqm_attestation_release_package_*.zip
            dist/zqm_attestation_release_package_*.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
